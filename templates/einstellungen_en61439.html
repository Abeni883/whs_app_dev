{% extends "base.html" %}

{% block title %}EN 61439 — Einstellungen - Abnahmetest{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h2>EN 61439 — Einstellungen</h2>
    </div>

    <form method="POST" class="settings-form">
        <div class="settings-section">
            <h3>Norm-Bezeichnung</h3>

            <div class="form-group">
                <label for="norm_name">Norm-Bezeichnung</label>
                <input type="text"
                       id="norm_name"
                       name="norm_name"
                       value="{{ norm_name }}"
                       placeholder="EN 61439-1/2"
                       class="form-input form-input-wide"
                       required>
                <p class="form-hint">
                    Wird überall im GUI und in den PDF-Exporten angezeigt.
                    <br>Standardwert: EN 61439-1/2
                </p>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Speichern</button>
        </div>
    </form>
</div>

<style>
.settings-form {
    max-width: 600px;
}

.settings-section {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
}

.settings-section h3 {
    margin: 0 0 1rem 0;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-primary);
    font-size: 1.1rem;
}

.form-group {
    margin-bottom: 1rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 600;
    color: var(--text-primary);
}

.form-input {
    padding: 0.5rem 0.75rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-size: 1rem;
    background: var(--bg-primary);
    color: var(--text-primary);
}

.form-input-wide {
    width: 300px;
    max-width: 100%;
}

.form-input:focus {
    outline: none;
    border-color: var(--accent-primary);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
}

.form-hint {
    margin-top: 0.5rem;
    font-size: 0.85rem;
    color: var(--text-tertiary);
    line-height: 1.4;
}

.form-actions {
    margin-top: 1.5rem;
}

.btn-primary {
    padding: 0.6rem 1.5rem;
    background: var(--accent-primary);
    color: var(--text-inverse);
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
}

.btn-primary:hover {
    background: var(--accent-primary-dark);
    transform: translateY(-1px);
}
</style>
{% endblock %}
