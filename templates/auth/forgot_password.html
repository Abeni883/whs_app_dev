<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort vergessen - Abnahmetest</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .btn-back {
            display: block;
            width: 100%;
            padding: 0.75rem 1.5rem;
            background-color: #10b981;
            color: #ffffff !important;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        .btn-back:hover {
            background-color: #059669;
        }
    </style>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Passwort vergessen</h1>
            </div>

            <div class="info-box">
                <p>Haben Sie Ihr Passwort vergessen?</p>
                <p>Bitte kontaktieren Sie einen Administrator. Der Administrator wird Ihnen ein temporäres Passwort geben.</p>
            </div>

            <div class="auth-links">
                <a href="{{ url_for('auth.login') }}" class="btn-back">Zurück zur Anmeldung</a>
            </div>
        </div>

        <div class="auth-footer">
            <p>&copy; 2025 Abnahmetest. Alle Rechte vorbehalten.</p>
        </div>
    </div>
</body>
</html>
